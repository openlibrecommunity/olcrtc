services:
  olcrtc-server:
    build:
      context: .
    image: olcrtc/server:local
    container_name: olcrtc-server
    restart: unless-stopped
    env_file:
      - .env.server
    environment:
      OLCRTC_PROVIDER: "${OLCRTC_PROVIDER:-jazz-visual}"
      OLCRTC_ROOM_ID: "${OLCRTC_ROOM_ID:?set OLCRTC_ROOM_ID (use any for jazz/jazz-visual)}"
      OLCRTC_KEY: "${OLCRTC_KEY:-}"
      OLCRTC_DNS: "${OLCRTC_DNS:-1.1.1.1:53}"
      OLCRTC_DUO: "${OLCRTC_DUO:-false}"
      OLCRTC_DEBUG: "${OLCRTC_DEBUG:-false}"
      OLCRTC_VISUAL_BACKGROUND: "${OLCRTC_VISUAL_BACKGROUND:-}"
      OLCRTC_VISUAL_DUMP: "${OLCRTC_VISUAL_DUMP:-}"
      OLCRTC_DATA_DIR: "${OLCRTC_DATA_DIR:-/usr/share/olcrtc}"
    volumes:
      - "${OLCRTC_STATE_DIR:-./data/docker/server-state}:/var/lib/olcrtc"
      - "${OLCRTC_MEDIA_DIR:-./data/docker/media}:/mnt/olcrtc-media"
    init: true
